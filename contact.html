<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | Cute Sea Otter Merch</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="Cute Sea Otter Logo"></a>
            <nav class="nav-links">
                <a href="index.html">首頁</a><a href="about.html">公司簡介</a><a href="casual.html">休閒服飾</a><a href="formal.html">正式服飾</a><a href="jewelry.html">飾品</a><a href="accessories.html">配件</a><a href="others.html">其它類</a><a href="contact.html" class="active">聯絡我們</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <h1 class="section-title">聯絡我們</h1>
        <div class="content-box">
            <p style="text-align: center; margin-bottom: 2rem;">有任何問題或合作提案，歡迎隨時與我們聯繫！我們可愛的客服團隊會盡快回覆您。</p>
            <form onsubmit="event.preventDefault(); alert('感謝您的來信！我們會盡快回覆。'); this.reset();">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">電子郵件</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">訊息內容</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">送出訊息</button>
            </form>
        </div>
    </main>
    <footer><p>&copy; 2026 Cute Sea Otter Merch. All rights reserved.</p></footer>
    <script src="js/data.js"></script><script src="js/app.js"></script>
</body>
</html>
